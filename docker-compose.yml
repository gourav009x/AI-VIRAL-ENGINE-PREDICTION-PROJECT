version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ML_SERVICE_URL=http://ml-service:8080/ml
      - MONGO_URI=mongodb://mongo:27017/viralengine
    depends_on:
      - mongo
      - ml-service

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
